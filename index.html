<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO ALMA - FIXED SYSTEM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; line-height: 1.1; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; padding: 2px; }
        .header { height: 55px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 3px solid #ff6600; margin-bottom: 5px; flex-shrink: 0; }
        .logo-main { font-size: 26px; color: #ff6600; font-weight: 900; }
        #time { font-size: 24px; color: #00ffcc; font-weight: 900; }
        .header-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #training-info { font-size: 16px; color: #ff6600; font-weight: bold; }
        
        #workout-timer { font-size: 28px; color: #ff0055; font-weight: 900; background: rgba(255, 0, 85, 0.1); padding: 2px 12px; border-radius: 6px; border: 1px solid #ff0055; margin-top: 2px; font-family: monospace; }
        #workout-timer.running { color: #00ffcc; border-color: #00ffcc; background: rgba(0, 255, 204, 0.1); animation: blink 1s infinite alternate; }
        #workout-timer.halfway { color: #ff9f43; border-color: #ff9f43; background: rgba(255, 159, 103, 0.1); }
        
        #container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .row { display: flex; flex: 1; gap: 4px; justify-content: center; align-items: stretch; max-height: 48%; }
        .card { background: #111; border: 1.5px solid #333; border-radius: 10px; display: flex; flex-direction: column; flex: 1; padding: 6px; overflow: hidden; }
        .name { font-size: 20px; color: #ff6600; text-align: center; border-bottom: 2px solid #444; margin-bottom: 3px; font-weight: 900; padding-bottom: 2px; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 2px 0; height: 16%; }
        .ex-text { font-size: 16px; font-weight: 700; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; display: flex; align-items: center; }
        .reps { 
            color: #00ffcc; font-weight: 900; border: 1.5px solid #00ffcc; 
            padding: 1px 4px; border-radius: 4px; font-size: 14px; 
            min-width: 70px; text-align: center; background: rgba(0,255,204,0.05);
            margin-right: 5px;
        }
        .weight { color: #ff9f43; font-weight: 900; margin-right: 6px; font-size: 13px; background: rgba(255,159,67,0.1); padding: 0 3px; border-radius: 3px; }
        .footer-credit { height: 18px; font-size: 11px; color: #444; text-align: left; padding: 0 10px; font-family: Arial; }
        
        @keyframes blink { from { opacity: 1; } to { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="header">
        <div id="time">00:00:00</div>
        <div class="header-center">
            <div id="training-info">טוען...</div>
            <div id="workout-timer">--:--</div>
        </div>
        <div class="logo-main">STUDIO ALMA</div>
    </div>
    <div id="container"></div>
    <div class="footer-credit">Developed by Gal E</div>

    <script>
        // קישורי ה-Publish הרשמיים שלך
        const MAIN_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTggXVWik8QaoDDmwiG2f8j10AChK6CorKyVSzciYilwcGdOIEg1cvK19ncB65S3RZpCIvJwORgxXna/pub?gid=0&single=true&output=csv`;
        const TIMER_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTggXVWik8QaoDDmwiG2f8j10AChK6CorKyVSzciYilwcGdOIEg1cvK19ncB65S3RZpCIvJwORgxXna/pub?gid=573894189&single=true&output=csv`;

        let timerSeconds = 0;
        let initialDuration = 0;
        let timerStatus = "STOP"; 
        let timerInterval = null;
        let spokenHalfway = false;
        let lastSpokenSecond = -1;

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 1.15;
                window.speechSynthesis.speak(utterance);
            }
        }

        // פונקציית עזר חסינה לפירוק שורות CSV המונעת קריסות קוד
        function parseCSV(text) {
            let lines = text.split(/\r?\n/);
            return lines.map(line => {
                let cells = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cells.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cells.push(current.trim());
                return cells;
            });
        }

        async function loadData() {
            try {
                const timestamp = '&t=' + Date.now();
                
                // 1. טעינת טיימר
                const resTimer = await fetch(TIMER_URL + timestamp);
                const textTimer = await resTimer.text();
                if (textTimer && textTimer.length > 0) {
                    const rowsTimer = parseCSV(textTimer);
                    parseTimerSettings(rowsTimer);
                }

                // 2. טעינת מתאמנות
                const resMain = await fetch(MAIN_URL + timestamp);
                const textMain = await resMain.text();
                if (textMain && textMain.length > 0) {
                    const rowsMain = parseCSV(textMain);
                    parse(rowsMain);
                }

            } catch (e) { 
                console.error("Error loading data: ", e); 
            }
        }

        function parseTimerSettings(rows) {
            let targetDurationInSeconds = 0;
            let targetStatus = "STOP";

            for (let i = 0; i < rows.length; i++) {
                for (let j = 0; j < rows[i].length; j++) {
                    let cell = rows[i][j] ? rows[i][j].replace(/^"|"$/g, '').trim() : "";
                    
                    if (cell === "זמן טיימר בדקות") {
                        let nextCell = rows[i][j+1] ? rows[i][j+1].replace(/^"|"$/g, '').trim() : "";
                        let val = parseFloat(nextCell);
                        if (!isNaN(val)) targetDurationInSeconds = Math.round(val * 60);
                    }
                    if (cell === "סטטוס טיימר") {
                        let nextCell = rows[i][j+1] ? rows[i][j+1].replace(/^"|"$/g, '').trim() : "STOP";
                        let val = nextCell.toUpperCase();
                        if (val === "START" || val === "STOP" || val === "RESET") targetStatus = val;
                    }
                }
            }

            if (targetStatus === "RESET") {
                clearInterval(timerInterval);
                timerInterval = null;
                timerStatus = "STOP";
                timerSeconds = targetDurationInSeconds;
                initialDuration = targetDurationInSeconds;
                spokenHalfway = false;
                lastSpokenSecond = -1;
                updateTimerDisplay();
            } else if (targetStatus === "START" && timerStatus !== "START") {
                timerStatus = "START";
                timerSeconds = targetDurationInSeconds;
                initialDuration = targetDurationInSeconds;
                spokenHalfway = false;
                lastSpokenSecond = -1;
                startLocalTimer();
            } else if (targetStatus === "STOP" && timerStatus === "START") {
                clearInterval(timerInterval);
                timerInterval = null;
                timerStatus = "STOP";
                updateTimerDisplay();
            } else if (timerStatus === "STOP" && targetStatus === "START") {
                timerSeconds = targetDurationInSeconds;
            }
        }

        function startLocalTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerStatus = "STOP";
                    speak("Time is up");
                    updateTimerDisplay();
                    return;
                }

                timerSeconds--;
                updateTimerDisplay();

                let halfTime = Math.floor(initialDuration / 2);
                if (timerSeconds === halfTime && !spokenHalfway && initialDuration > 10) {
                    speak("Half way");
                    spokenHalfway = true;
                }

                if (timerSeconds <= 5 && timerSeconds > 0 && lastSpokenSecond !== timerSeconds) {
                    speak(timerSeconds.toString());
                    lastSpokenSecond = timerSeconds;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('workout-timer');
            let mins = Math.floor(timerSeconds / 60);
            let secs = timerSeconds % 60;
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            if (timerStatus === "START") {
                timerEl.className = "running";
                let halfTime = Math.floor(initialDuration / 2);
                if (timerSeconds <= halfTime) {
                    timerEl.classList.add("halfway");
                }
            } else {
                timerEl.className = "";
            }
        }

        function parse(rows) {
            const now = new Date();
            const nowMin = (now.getHours() * 60) + now.getMinutes();
            let sessions = [], current = null;

            rows.forEach(row => {
                if (!row || row.length === 0) return;
                let firstCell = row[0] ? row[0].replace(/^"|"$/g, '').trim() : "";
                
                if (firstCell.includes("אימון")) {
                    const m = firstCell.match(/(\d{1,2}):(\d{2})/);
                    if (m) {
                        if (current) sessions.push(current);
                        current = { start: (parseInt(m[1])*60)+parseInt(m[2]), title: firstCell, trainees: [] };
                    }
                } else if (current && firstCell !== "מתאמנת" && firstCell !== "") {
                    if (firstCell !== "זמן טיימר בדקות" && firstCell !== "סטטוס טיימר") {
                        current.trainees.push(row);
                    }
                }
            });
            if (current) sessions.push(current);

            let active = null;
            for (let i = 0; i < sessions.length; i++) {
                let s = sessions[i];
                let nextS = sessions[i+1];
                if (nowMin >= s.start && (!nextS || nowMin < nextS.start)) {
                    if (nowMin < s.start + 65) active = s;
                } else if (nowMin >= s.start - 10 && nowMin < s.start) {
                    active = s;
                }
            }
            render(active);
        }

        function render(active) {
            const container =
